<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dapur Mama - Daftar</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  background: #FFF8F0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
.phone-frame {
  width: 375px;
  height: 812px;
  background: #FFF8F0;
  overflow-y: auto;
  position: relative;
  border-radius: 40px;
  box-shadow: 0 25px 80px rgba(0,0,0,0.15);
  border: 8px solid #1a1a1a;
}
.phone-frame::-webkit-scrollbar { display: none; }
.top-section {
  height: 340px;
  background: linear-gradient(135deg, #2D6A4F 0%, #245a42 50%, #2D6A4F 100%);
  border-radius: 0 0 40px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 30px 50px;
  position: relative;
  overflow: hidden;
}
.top-section::before {
  content: '';
  position: absolute;
  top: -50px;
  left: -50px;
  width: 180px;
  height: 180px;
  background: rgba(255,255,255,0.06);
  border-radius: 50%;
}
.top-section::after {
  content: '';
  position: absolute;
  bottom: -50px;
  right: -30px;
  width: 140px;
  height: 140px;
  background: rgba(255,255,255,0.04);
  border-radius: 50%;
}
.back-btn {
  position: absolute;
  top: 20px;
  left: 20px;
  width: 36px;
  height: 36px;
  background: rgba(255,255,255,0.15);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.logo-icon {
  width: 72px;
  height: 72px;
  background: rgba(255,255,255,0.2);
  border-radius: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
  border: 2px solid rgba(255,255,255,0.3);
}
.app-title {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
}
.app-subtitle {
  color: rgba(255,255,255,0.85);
  font-size: 13px;
  margin-top: 4px;
  font-weight: 300;
}
.form-section {
  padding: 28px 28px 40px;
  margin-top: -28px;
  position: relative;
  z-index: 2;
}
.form-section h2 {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: #1a1a1a;
  margin-bottom: 4px;
  font-weight: 600;
}
.form-section p {
  color: #888;
  font-size: 13px;
  margin-bottom: 24px;
}
.input-group {
  margin-bottom: 16px;
}
.input-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #333;
  margin-bottom: 5px;
}
.input-wrapper {
  position: relative;
}
.input-wrapper input {
  width: 100%;
  height: 48px;
  border: 1.5px solid #e5e5e5;
  border-radius: 14px;
  padding: 0 16px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  color: #333;
  background: #fff;
  outline: none;
  transition: border-color 0.2s;
}
.input-wrapper input:focus {
  border-color: #2D6A4F;
  box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
}
.input-wrapper .input-icon {
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  color: #aaa;
}
.input-wrapper input::placeholder { color: #bbb; }
.input-row {
  display: flex;
  gap: 12px;
}
.input-row .input-group { flex: 1; }
.terms-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin: 20px 0 24px;
}
.terms-check {
  width: 18px;
  height: 18px;
  border: 1.5px solid #ccc;
  border-radius: 5px;
  flex-shrink: 0;
  margin-top: 1px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #fff;
}
.terms-check.checked {
  background: #2D6A4F;
  border-color: #2D6A4F;
  color: #fff;
  font-size: 11px;
}
.terms-text {
  font-size: 12px;
  color: #666;
  line-height: 1.5;
}
.terms-text a {
  color: #2D6A4F;
  font-weight: 600;
  text-decoration: none;
}
.btn-register {
  width: 100%;
  height: 52px;
  background: linear-gradient(135deg, #2D6A4F, #245a42);
  border: none;
  border-radius: 14px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  box-shadow: 0 4px 15px rgba(45,106,79,0.35);
}
.btn-register:active {
  transform: scale(0.98);
  box-shadow: 0 2px 8px rgba(45,106,79,0.25);
}
.social-btn {
  width: 100%;
  height: 46px;
  border: 1.5px solid #e5e5e5;
  border-radius: 14px;
  background: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: #333;
  cursor: pointer;
  margin-bottom: 12px;
}
.divider {
  display: flex;
  align-items: center;
  margin: 20px 0;
  gap: 12px;
}
.divider-line { flex: 1; height: 1px; background: #e5e5e5; }
.divider-text { font-size: 12px; color: #aaa; font-weight: 500; }
.login-prompt {
  text-align: center;
  margin-top: 20px;
  padding-bottom: 40px;
}
.login-prompt span { font-size: 13px; color: #888; }
.login-prompt a { font-size: 13px; color: #2D6A4F; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
<div class="phone-frame">
  <div class="top-section">
    <button class="back-btn">←</button>
    <div class="logo-icon">🍽</div>
    <div class="app-title">Dapur Mama</div>
    <div class="app-subtitle">Bergabung dengan komunitas memasak</div>
  </div>

  <div class="form-section">
    <h2>Buat Akun Baru</h2>
    <p>Isi data dirimu untuk memulai</p>

    <div class="input-group">
      <label>Nama Lengkap</label>
      <div class="input-wrapper">
        <input type="text" placeholder="Contoh: Sari Dewi">
        <span class="input-icon">👤</span>
      </div>
    </div>

    <div class="input-group">
      <label>Email</label>
      <div class="input-wrapper">
        <input type="email" placeholder="Contoh: sari@email.com">
        <span class="input-icon">✉</span>
      </div>
    </div>

    <div class="input-row">
      <div class="input-group">
        <label>Kata Sandi</label>
        <div class="input-wrapper">
          <input type="password" placeholder="Minimal 6 karakter">
          <span class="input-icon">👁</span>
        </div>
      </div>
      <div class="input-group">
        <label>Konfirmasi</label>
        <div class="input-wrapper">
          <input type="password" placeholder="Ulangi sandi">
          <span class="input-icon">👁</span>
        </div>
      </div>
    </div>

    <div class="terms-row">
      <div class="terms-check checked">✓</div>
      <div class="terms-text">
        Saya setuju dengan <a href="#">Syarat & Ketentuan</a> dan <a href="#">Kebijakan Privasi</a> Dapur Mama
      </div>
    </div>

    <button class="btn-register">Daftar Sekarang</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">atau daftar dengan</span>
      <div class="divider-line"></div>
    </div>

    <button class="social-btn">
      <span style="font-size:18px">G</span> Google
    </button>

    <div class="login-prompt">
      <span>Sudah punya akun? </span>
      <a href="1-login.html">Masuk di sini</a>
    </div>
  </div>
</div>
</body>
</html>
