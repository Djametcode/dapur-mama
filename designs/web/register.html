<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1440">
<title>Dapur Mama - Daftar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#FFF8F0;min-height:100vh;display:flex}
.left{width:50%;background:linear-gradient(135deg,#E07A2F 0%,#c96a22 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;position:relative;overflow:hidden}
.left::before{content:'';position:absolute;top:-50px;left:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,0.08)}
.left::after{content:'';position:absolute;bottom:-80px;right:-30px;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,0.05)}
.brand{text-align:center;color:white;z-index:1}
.brand-icon{font-size:64px;margin-bottom:16px}
.brand h1{font-family:'Playfair Display',serif;font-size:36px;margin-bottom:8px}
.brand p{font-size:16px;opacity:0.9;max-width:320px;line-height:1.6}
.food-images{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:40px;z-index:1}
.food-img{width:140px;height:140px;border-radius:16px;object-fit:cover;box-shadow:0 8px 24px rgba(0,0,0,0.2);border:3px solid rgba(255,255,255,0.3)}
.food-img:nth-child(2){transform:translateY(20px)}
.food-img:nth-child(3){transform:translateY(-20px)}
.right{width:50%;display:flex;align-items:center;justify-content:center;padding:60px}
.form-container{width:100%;max-width:440px}
.form-container h2{font-family:'Playfair Display',serif;font-size:32px;color:#333;margin-bottom:8px}
.form-container .subtitle{color:#666;margin-bottom:32px;font-size:15px}
.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:14px;font-weight:500;color:#333;margin-bottom:6px}
.form-group input{width:100%;padding:14px 16px;border:2px solid #E8E0D8;border-radius:12px;font-size:15px;font-family:'Inter',sans-serif;background:white;color:#333;transition:border-color 0.3s}
.form-group input:focus{outline:none;border-color:#E07A2F}
.form-group input::placeholder{color:#bbb}
.name-row{display:flex;gap:16px}
.name-row .form-group{flex:1}
.btn-register{width:100%;padding:16px;background:#E07A2F;color:white;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;margin-top:8px;transition:background 0.3s}
.btn-register:hover{background:#c96a22}
.divider{display:flex;align-items:center;margin:24px 0;gap:16px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E8E0D8}
.divider span{color:#999;font-size:13px}
.social-btns{display:flex;gap:12px;margin-bottom:24px}
.social-btn{flex:1;padding:12px;border:2px solid #E8E0D8;border-radius:12px;background:white;font-size:14px;font-weight:500;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;color:#333}
.social-btn:hover{border-color:#ccc}
.login-link{text-align:center;color:#666;font-size:14px}
.login-link a{color:#E07A2F;font-weight:600;text-decoration:none}
.navbar{position:fixed;top:0;left:0;right:0;height:64px;background:rgba(255,248,240,0.95);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:space-between;padding:0 40px;border-bottom:1px solid #f0e8e0;z-index:10}
.nav-logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:#E07A2F;display:flex;align-items:center;gap:8px}
.nav-links{display:flex;gap:24px;align-items:center}
.nav-links a{text-decoration:none;color:#333;font-size:14px;font-weight:500}
.nav-links a:hover{color:#E07A2F}
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-logo">🍳 Dapur Mama</div>
  <div class="nav-links">
    <a href="#">Beranda</a>
    <a href="#">Resep</a>
    <a href="#">Komunitas</a>
    <a href="#">Tentang</a>
  </div>
</nav>
<div class="left">
  <div class="brand">
    <div class="brand-icon">👩‍🍳</div>
    <h1>Dapur Mama</h1>
    <p>Bergabunglah dengan ribuan ibu rumah tangga yang berbagi resep dan tips memasak lezat setiap hari.</p>
    <div class="food-images">
      <img class="food-img" src="https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=300&h=300&fit=crop" alt="Food 1">
      <img class="food-img" src="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=300&h=300&fit=crop" alt="Food 2">
      <img class="food-img" src="https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=300&h=300&fit=crop" alt="Food 3">
      <img class="food-img" src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=300&h=300&fit=crop" alt="Food 4">
    </div>
  </div>
</div>
<div class="right">
  <div class="form-container">
    <h2>Buat Akun Baru ✨</h2>
    <p class="subtitle">Mulai petualangan kulinermu bersama Dapur Mama</p>
    <div class="name-row">
      <div class="form-group">
        <label>Nama Depan</label>
        <input type="text" placeholder="Siti">
      </div>
      <div class="form-group">
        <label>Nama Belakang</label>
        <input type="text" placeholder="Nurhaliza">
      </div>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" placeholder="siti@email.com">
    </div>
    <div class="form-group">
      <label>Kata Sandi</label>
      <input type="password" placeholder="Minimal 8 karakter">
    </div>
    <div class="form-group">
      <label>Konfirmasi Kata Sandi</label>
      <input type="password" placeholder="Ulangi kata sandi">
    </div>
    <button class="btn-register">Daftar Sekarang</button>
    <div class="divider"><span>atau daftar dengan</span></div>
    <div class="social-btns">
      <button class="social-btn">🔵 Google</button>
      <button class="social-btn">⚫ Facebook</button>
    </div>
    <p class="login-link">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
  </div>
</div>
</body>
</html>
